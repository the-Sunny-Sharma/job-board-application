services:
  # ── MySQL Database ──
  mysql-db:
    image: mysql:8.0
    container_name: jobboard-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: jobboard_db
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - jobboard-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot App ──
  jobboard-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jobboard-app
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      # ── These are the exact variable names your application-prod expects ──
      MYSQLHOST: mysql-db
      MYSQLPORT: 3306
      MYSQL_DATABASE: jobboard_db
      MYSQLUSER: ${DB_USERNAME}
      MYSQLPASSWORD: ${DB_PASSWORD}
      # ── All other environment variables stay the same ──
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      AI_API_KEY: ${AI_API_KEY}
      AI_BASE_URL: ${AI_BASE_URL}
      AI_MODEL: ${AI_MODEL}
    depends_on:
      mysql-db:
        condition: service_healthy
    networks:
      - jobboard-network

volumes:
  mysql-data:

networks:
  jobboard-network:
    driver: bridge